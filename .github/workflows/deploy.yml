name: "Terraform Infrastructure"

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Terraform Output
        id: tf_outputs
        run: |
          echo "RDS_HOST=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT
          echo "SQS_URL=$(terraform output -raw sqs_url)" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      - name: Inject Secrets into API and Worker Repos
        run: |
          # Capturar os outputs do Terraform
          RDS_HOST=$(terraform output -raw rds_endpoint)
          SQS_URL=$(terraform output -raw sqs_url)
          S3_BUCKET=$(terraform output -raw s3_bucket_name)

          echo "${{ secrets.MY_PAT }}" | gh auth login --with-token

          #Repositório api
          gh secret set DB_HOST --body "$RDS_HOST" --repo "RafaelCAntunes/fiap-x-api"
          gh secret set S3_BUCKET_NAME --body "$S3_BUCKET" --repo "RafaelCAntunes/fiap-x-api"
          gh secret set SQS_QUEUE_URL --body "$SQS_URL" --repo "RafaelCAntunes/fiap-x-api"

          #Repositório do Worker
          gh secret set SQS_QUEUE_URL --body "$SQS_URL" --repo "RafaelCAntunes/fiap-x-worker"
          gh secret set DB_HOST --body "$RDS_HOST" --repo "RafaelCAntunes/fiap-x-worker"
          gh secret set S3_BUCKET_NAME --body "$S3_BUCKET" --repo "RafaelCAntunes/fiap-x-worker"
        working-directory: ./terraform